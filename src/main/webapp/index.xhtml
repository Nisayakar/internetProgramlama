<ui:composition template="/template.xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="jakarta.faces.passthrough">
    <ui:param name="activePage" value="store"/>
    <ui:define name="title">CleanMarket - Mağaza</ui:define>
    <ui:define name="mainContent">
        <main class="mx-auto max-w-screen-2xl px-4 py-8 sm:px-6 lg:px-8">
            <section class="relative overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
                <img src="#{request.contextPath}/resources/images/NİSAEkran görüntüsü 2026-05-02 222643.png"
                     alt="Organik ürünler ve tarım alanı"
                     class="absolute inset-0 w-full h-full object-cover object-center z-0"/>
                <div class="absolute inset-0 bg-gradient-to-r from-white via-white/80 to-transparent w-full md:w-3/4 z-10"></div>
                <div class="relative grid min-h-[300px] gap-6 p-7 md:grid-cols-[1fr_auto] md:items-center lg:p-10">
                    <div class="relative z-20 flex flex-col justify-center h-full p-8 md:p-16 max-w-2xl">
                        <span class="text-sm font-bold uppercase tracking-wide text-teal-700">Çevrim içi market</span>
                        <h1 class="mt-2 max-w-2xl text-4xl font-black tracking-tight text-slate-950">Taze, düzenli ve hızlı alışveriş.</h1>
                        <p class="mt-3 max-w-2xl text-slate-700">Seçilmiş ürünleri inceleyin, sepetinizi anında yönetin ve siparişinizi tamamlayın.</p>
                    </div>
                </div>
            </section>

            <div class="mt-8">
                <section>
                    <h:panelGroup rendered="#{empty productBean.allProducts}"
                                  layout="block"
                                  styleClass="rounded-lg border border-sky-200 bg-sky-50 px-5 py-4 text-sm font-semibold text-sky-800">
                        Ürün bulunamadı.
                    </h:panelGroup>

                    <div class="grid grid-cols-1 gap-6 w-full md:grid-cols-2 xl:grid-cols-3">
                        <ui:repeat value="#{productBean.allProducts}" var="product">
                            <div class="flex flex-col bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-xl transition-shadow duration-300 h-full w-full min-w-0">
                                <h:link outcome="/product.xhtml" styleClass="block">
                                    <f:param name="id" value="#{product.id}"/>
                                    <div class="relative w-full h-72 bg-white overflow-hidden shrink-0 flex items-center justify-center p-4">
                                        <ui:fragment rendered="#{not empty product.imageUrl}">
                                            <img src="#{resource[product.imageResourcePath]}"
                                                 alt="#{product.name}"
                                                 class="w-full h-full object-contain"
                                                 onerror="this.onerror=null; this.parentElement.innerHTML='&lt;i class=&quot;bi bi-image-off text-4xl text-slate-400&quot;&gt;&lt;/i&gt;';"/>
                                        </ui:fragment>
                                        <ui:fragment rendered="#{empty product.imageUrl}">
                                            <i class="bi bi-image text-4xl text-slate-400"></i>
                                        </ui:fragment>
                                    </div>
                                </h:link>

                                <div class="p-5 flex flex-col flex-1 gap-3">
                                    <h:link outcome="/product.xhtml" styleClass="block hover:text-teal-700">
                                        <f:param name="id" value="#{product.id}"/>
                                        <h3 class="font-h3 text-xl text-slate-950 line-clamp-2" title="#{product.name}">#{product.name}</h3>
                                    </h:link>
                                    <h:link outcome="/product.xhtml" styleClass="block">
                                        <f:param name="id" value="#{product.id}"/>
                                        <p class="font-body-md text-sm text-slate-500 line-clamp-2">#{product.description}</p>
                                    </h:link>

                                    <div class="mt-auto pt-4 flex items-center justify-between">
                                        <div>
                                            <span class="block text-xs text-slate-500 font-label-sm">FİYAT</span>
                                            <span class="font-h3 text-2xl text-teal-700">#{product.currentPrice} TL</span>
                                        </div>
                                        <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-md text-xs font-label-sm">Stok: #{product.stockQuantity}</span>
                                    </div>

                                    <h:form>
                                        <h:commandButton action="#{cartBean.addToCart(product.id)}"
                                                         value="Sepete Ekle"
                                                         styleClass="w-full mt-3 bg-teal-700 text-white py-3 rounded-lg font-label-sm hover:bg-teal-800 transition-colors"/>
                                    </h:form>
                                </div>
                            </div>
                        </ui:repeat>
                    </div>
                </section>

            </div>
        </main>
    </ui:define>
</ui:composition>
