<ui:composition template="/template.xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core">
    <ui:param name="activePage" value="addresses"/>
    <ui:define name="title">CleanMarket - Adreslerim</ui:define>
    <ui:define name="mainContent">
        <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
            <section class="mb-6 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
                <span class="text-sm font-bold uppercase tracking-wide text-teal-700">Hesabım</span>
                <h1 class="mt-2 text-3xl font-black text-slate-950">Adreslerim</h1>
                <p class="mt-2 text-slate-500">Teslimat adreslerinizi buradan ekleyip düzenleyebilirsiniz.</p>
            </section>

            <h:messages globalOnly="true" layout="list" styleClass="mb-6 rounded-lg border border-emerald-200 bg-emerald-50 px-5 py-4 text-sm font-semibold text-emerald-700"/>

            <div class="grid gap-6 lg:grid-cols-[380px_minmax(0,1fr)]">
                <section class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
                    <h2 class="text-xl font-black text-slate-950">Adres Formu</h2>
                    <h:form styleClass="mt-5 space-y-4">
                        <div>
                            <label class="mb-2 block text-sm font-bold text-slate-700">Başlık</label>
                            <h:inputText value="#{addressBean.address.title}" required="true" styleClass="w-full rounded-lg border border-slate-300 px-4 py-3 outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100"/>
                        </div>
                        <div class="grid gap-4 sm:grid-cols-2">
                            <div>
                                <label class="mb-2 block text-sm font-bold text-slate-700">İl</label>
                                <h:inputText value="#{addressBean.address.city}" required="true" styleClass="w-full rounded-lg border border-slate-300 px-4 py-3 outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100"/>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-slate-700">İlçe</label>
                                <h:inputText value="#{addressBean.address.district}" required="true" styleClass="w-full rounded-lg border border-slate-300 px-4 py-3 outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100"/>
                            </div>
                        </div>
                        <div>
                            <label class="mb-2 block text-sm font-bold text-slate-700">Telefon</label>
                            <h:inputText value="#{addressBean.address.phone}" styleClass="w-full rounded-lg border border-slate-300 px-4 py-3 outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100"/>
                        </div>
                        <div>
                            <label class="mb-2 block text-sm font-bold text-slate-700">Açık Adres</label>
                            <h:inputTextarea value="#{addressBean.address.fullAddress}" required="true" rows="5" styleClass="w-full rounded-lg border border-slate-300 px-4 py-3 outline-none focus:border-teal-600 focus:ring-4 focus:ring-teal-100"/>
                        </div>
                        <div class="grid gap-3 sm:grid-cols-2">
                            <h:commandButton action="#{addressBean.save()}" value="Kaydet" styleClass="rounded-lg bg-teal-700 px-4 py-3 font-bold text-white hover:bg-teal-800"/>
                            <h:commandButton action="#{addressBean.clear()}" value="Temizle" immediate="true" styleClass="rounded-lg border border-slate-300 px-4 py-3 font-bold text-slate-700 hover:bg-slate-50"/>
                        </div>
                    </h:form>
                </section>

                <section class="space-y-4">
                    <h:panelGroup rendered="#{addressBean.noAddresses}" layout="block" styleClass="rounded-lg border border-sky-200 bg-sky-50 px-5 py-4 text-sm font-semibold text-sky-800">
                        Henüz kayıtlı adresiniz yok.
                    </h:panelGroup>

                    <ui:repeat value="#{addressBean.myAddresses}" var="address">
                        <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
                            <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                                <div>
                                    <h2 class="text-lg font-black text-slate-950">#{address.title}</h2>
                                    <p class="mt-1 text-sm font-semibold text-slate-600">#{address.city} / #{address.district}</p>
                                    <p class="mt-3 text-sm leading-6 text-slate-500">#{address.fullAddress}</p>
                                    <p class="mt-2 text-sm text-slate-500">#{address.phone}</p>
                                </div>
                                <h:form styleClass="flex gap-2">
                                    <h:commandButton action="#{addressBean.edit(address)}" value="Düzenle" styleClass="rounded-lg border border-slate-300 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50"/>
                                    <h:commandButton action="#{addressBean.delete(address)}" value="Sil" styleClass="rounded-lg border border-rose-200 px-4 py-2 text-sm font-bold text-rose-700 hover:bg-rose-50"/>
                                </h:form>
                            </div>
                        </article>
                    </ui:repeat>
                </section>
            </div>
        </main>
    </ui:define>
</ui:composition>
